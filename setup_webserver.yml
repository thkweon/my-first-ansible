# ==========================================
# 2. 타겟 서버 설치 및 설정 (Linux & macOS)
# ==========================================
- name: Setup Nginx Web Server
  hosts: all
  gather_facts: true
  tasks:
    - name: (Linux) Install Nginx using apt
      apt:
        name: nginx
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"
      become: true

    - name: (macOS) Install Nginx via brew
      shell: brew install nginx || true
      when: ansible_os_family == "Darwin"
      register: brew_res
      changed_when: "'Installing' in brew_res.stdout"

    - name: Set OS specific variables
      set_fact:
        # 충돌 방지를 위해 my_web.conf 사용
        nginx_conf_dest: "{{ (ansible_os_family == 'Darwin') | ternary('/usr/local/etc/nginx/servers/my_web.conf', '/etc/nginx/conf.d/my_web.conf') }}"
        web_root: "{{ (ansible_os_family == 'Darwin') | ternary('/usr/local/var/www', '/var/www/html') }}"

    - name: (Linux) Remove default nginx config to avoid conflict
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/nginx/sites-enabled/default
        - /etc/nginx/sites-available/default
      when: ansible_os_family == "Debian"
      become: true

    - name: (macOS) Ensure directories exist
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "/usr/local/etc/nginx/servers"
        - "/usr/local/var/www"
      when: ansible_os_family == "Darwin"

    - name: Configure Nginx to listen on 9999
      copy:
        dest: "{{ nginx_conf_dest }}"
        content: |
          server {
              listen 9999;
              server_name localhost;
              root {{ web_root }};
              index index.html;
              location / {
                  try_files $uri $uri/ =404;
              }
          }
      become: "{{ ansible_os_family == 'Debian' }}"
      notify: Restart Nginx

    - name: Deploy dynamic index.html using template
      template:
        src: ./index.html.j2
        dest: "{{ web_root }}/index.html"
        mode: '0644'
      become: "{{ ansible_os_family == 'Debian' }}"
      notify: Restart Nginx

    - name: (macOS) Start/Reload Nginx
      shell: |
        NGINX_BIN=$(which nginx || echo "/usr/local/bin/nginx")
        if ! pgrep nginx > /dev/null; then
          $NGINX_BIN -g "daemon on; pid /usr/local/var/run/nginx/nginx.pid;"
        else
          $NGINX_BIN -g "pid /usr/local/var/run/nginx/nginx.pid;" -s reload
        fi
      when: ansible_os_family == "Darwin"

  handlers:
    - name: Restart Nginx
      service:
        name: nginx
        state: restarted
      become: true
      when: ansible_os_family == "Debian"

