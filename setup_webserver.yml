---
# ==========================================
# 1. Vault에서 동적 SSH 키 발급받기
# ==========================================
- name: Get Dynamic SSH Key from Vault
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Login to Vault
      uri:
        url: "{{ lookup('env', 'VAULT_ADDR') }}/v1/auth/approle/login"
        method: POST
        body_format: json
        body:
          role_id: "{{ lookup('env', 'VAULT_ROLE_ID') }}"
          secret_id: "{{ lookup('env', 'VAULT_SECRET_ID') }}"
      register: vault_login

    - name: Fetch Dynamic SSH Key
      uri:
        # 주의: 아래 URL은 실제 Vault의 SSH 시크릿 엔진 경로로 맞춰주세요!
        # 예시: v1/ssh/creds/내_역할이름
        url: "{{ lookup('env', 'VAULT_ADDR') }}/v1/secret/data/my_ssh_key" 
        method: GET
        headers:
          X-Vault-Token: "{{ vault_login.json.auth.client_token }}"
      register: vault_key_data

    - name: Save private key to temp file
      copy:
        # 주의: Vault에서 발급하는 JSON 구조에 따라 아래 경로가 조금 다를 수 있습니다.
        content: "{{ vault_key_data.json.data.data.private_key }}" 
        dest: "/tmp/dynamic_ssh_key.pem"
        mode: '0600'

    - name: Apply temporary SSH key
      set_fact:
        ansible_ssh_private_key_file: "/tmp/dynamic_ssh_key.pem"
      delegate_to: "{{ item }}"
      delegate_facts: true
      loop: "{{ groups['all'] }}"

# ==========================================
# 2. 타겟 서버에 Nginx 웹 서버 설치 및 배포 (9999 포트)
# ==========================================
- name: Setup Nginx Web Server
  hosts: all
  become: true  # 관리자 권한
  gather_facts: true
  tasks:
    - name: 패키지 매니저 업데이트 및 Nginx 설치
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Change Nginx default port to 9999 (IPv4)
      replace:
        path: /etc/nginx/sites-available/default
        regexp: 'listen 80( default_server)?;'
        replace: 'listen 9999\1;'

    - name: Change Nginx default port to 9999 (IPv6)
      replace:
        path: /etc/nginx/sites-available/default
        regexp: 'listen \[::\]:80( default_server)?;'
        replace: 'listen [::]:9999\1;'

    - name: 내가 만든 index.html 파일을 웹 서버로 복사
      copy:
        src: ./index.html
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'

    - name: Nginx 서비스 재시작 및 부팅 시 자동 실행 설정
      service:
        name: nginx
        state: restarted
        enabled: yes

    - name: Cleanup temporary key file
      file:
        path: "/tmp/dynamic_ssh_key.pem"
        state: absent
      delegate_to: localhost
      run_once: true