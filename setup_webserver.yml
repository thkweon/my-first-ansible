# ==========================================
# 1. Vault SSH CA (1회용 인증서 발급)
# ==========================================
- name: Get Dynamic SSH Cert from Vault
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Generate temporary SSH keypair
      community.crypto.openssh_keypair:
        path: /tmp/dynamic_ssh_key
        type: ed25519
      register: temp_keypair

    - name: Login to Vault AppRole
      uri:
        url: "{{ lookup('env', 'VAULT_ADDR') }}/v1/auth/approle-ssh/login"
        method: POST
        body_format: json
        body:
          role_id: "{{ lookup('env', 'VAULT_ROLE_ID') }}"
          secret_id: "{{ lookup('env', 'VAULT_SECRET_ID') }}"
      register: vault_login

    - name: Sign SSH Public Key via Vault
      uri:
        url: "{{ lookup('env', 'VAULT_ADDR') }}/v1/ssh/sign/shadowlinux"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_login.json.auth.client_token }}"
        body_format: json
        body:
          public_key: "{{ temp_keypair.public_key }}"
      register: vault_signed_cert

    - name: Save signed certificate to file
      copy:
        content: "{{ vault_signed_cert.json.data.signed_key }}"
        dest: "/tmp/dynamic_ssh_key-cert.pub"
        mode: '0644'

    - name: Apply SSH Key and Certificate to target hosts
      set_fact:
        ansible_ssh_private_key_file: "/tmp/dynamic_ssh_key"
        ansible_ssh_common_args: "-o CertificateFile=/tmp/dynamic_ssh_key-cert.pub -o StrictHostKeyChecking=no"
      delegate_to: "{{ item }}"
      delegate_facts: true
      loop: "{{ groups['all'] }}"

# ==========================================
# 2. 타겟 서버 설치 및 설정 (Linux & macOS)
# ==========================================
- name: Setup Nginx Web Server
  hosts: all
  gather_facts: true
  tasks:
    # [Linux] Nginx 설치
    - name: (Linux) Install Nginx using apt
      apt:
        name: nginx
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"
      become: true

    # [macOS] Nginx 설치 (구형 OS 에러 무시를 위해 shell 사용)
    - name: (macOS) Install Nginx via brew shell
      shell: brew install nginx || true
      when: ansible_os_family == "Darwin"
      register: brew_res
      changed_when: "'Installing' in brew_res.stdout"

    # [공통] OS별 경로 변수 설정
    - name: Set OS specific variables
      set_fact:
        nginx_conf_dest: "{{ (ansible_os_family == 'Darwin') | ternary('/usr/local/etc/nginx/servers/default.conf', '/etc/nginx/sites-available/default') }}"
        web_root: "{{ (ansible_os_family == 'Darwin') | ternary('/usr/local/var/www', '/var/www/html') }}"

    # [macOS] 설정 및 웹 루트 디렉토리 보장
    - name: (macOS) Ensure directories exist
      file:
        path: "{{ item }}"
        state: directory
      loop:
        - "/usr/local/etc/nginx/servers"
        - "/usr/local/var/www"
      when: ansible_os_family == "Darwin"

    # [공통] 9999 포트 설정 파일 배포
    - name: Configure Nginx to listen on 9999
      copy:
        dest: "{{ nginx_conf_dest }}"
        content: |
          server {
              listen 9999;
              server_name localhost;
              root {{ web_root }};
              index index.html;
              location / {
                  try_files $uri $uri/ =404;
              }
          }
      become: "{{ ansible_os_family == 'Debian' }}"
      notify: Restart Nginx

    # [공통] index.html 파일 복사
    - name: Copy index.html to web root
      copy:
        src: ./index.html
        dest: "{{ web_root }}/index.html"
        mode: '0644'
      become: "{{ ansible_os_family == 'Debian' }}"

    # [macOS] 설정 및 웹 루트, 그리고 Nginx 가동에 필요한 임시 폴더들까지 생성
    - name: (macOS) Ensure directories exist
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "/usr/local/etc/nginx/servers"
        - "/usr/local/var/www"
        - "/usr/local/var/run/nginx"      # 추가: 실행 파일(PID)용
        - "/usr/local/var/log/nginx"      # 추가: 로그용
        - "/usr/local/var/run/nginx/client_body_temp" # 에러 났던 바로 그 폴더!
      when: ansible_os_family == "Darwin"

    # [공통] 9999 포트 설정 파일 배포 (생략 - 기존과 동일)

    # [macOS] Nginx 직접 실행
    - name: (macOS) Start Nginx manually if not running
      shell: |
        NGINX_BIN=$(which nginx || echo "/usr/local/bin/nginx")
        
        # 권한 문제 예방을 위해 설정 파일 테스트 후 실행
        if ! pgrep nginx > /dev/null; then
          $NGINX_BIN -g 'daemon on;'
        else
          $NGINX_BIN -s reload
        fi
      when: ansible_os_family == "Darwin"
      register: mac_nginx_start
      # 에러가 나더라도 이미 실행 중이거나 사소한 로그 에러면 무시
      failed_when: 
        - mac_nginx_start.rc != 0
        - "'already running' not in mac_nginx_start.stderr"
        - "'notice' not in mac_nginx_start.stderr"
        
# ==========================================
# 3. 임시 파일 정리 (Localhost)
# ==========================================
- name: Cleanup temporary key files
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Remove temp keys
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/tmp/dynamic_ssh_key"
        - "/tmp/dynamic_ssh_key.pub"
        - "/tmp/dynamic_ssh_key-cert.pub"