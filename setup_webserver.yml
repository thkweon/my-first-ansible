---
# ==========================================
# 1. Vault SSH CA를 통해 1회용 인증서 서명 받기
# ==========================================
- name: Get Dynamic SSH Cert from Vault
  hosts: localhost
  gather_facts: false
  tasks:
    # 1. Semaphore 내부에 1회용 임시 SSH 키쌍 생성
    - name: Generate temporary SSH keypair
      community.crypto.openssh_keypair:
        path: /tmp/dynamic_ssh_key
        type: ed25519
      register: temp_keypair

    # 2. Vault AppRole 로그인 (경로를 approle-ssh 로 수정!)
    - name: Login to Vault AppRole
      uri:
        url: "{{ lookup('env', 'VAULT_ADDR') }}/v1/auth/approle-ssh/login"
        method: POST
        body_format: json
        body:
          role_id: "{{ lookup('env', 'VAULT_ROLE_ID') }}"
          secret_id: "{{ lookup('env', 'VAULT_SECRET_ID') }}"
      register: vault_login

    # 3. 생성한 공개키를 shadowlinux 엔진에 던져서 서명(Certificate) 받아오기
    - name: Sign SSH Public Key via Vault
      uri:
        url: "{{ lookup('env', 'VAULT_ADDR') }}/v1/ssh/sign/shadowlinux"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_login.json.auth.client_token }}"
        body_format: json
        body:
          public_key: "{{ temp_keypair.public_key }}"
      register: vault_signed_cert

    # 4. 받아온 서명(인증서)을 파일로 저장 (-cert.pub 확장자 필수)
    - name: Save signed certificate to file
      copy:
        content: "{{ vault_signed_cert.json.data.signed_key }}"
        dest: "/tmp/dynamic_ssh_key-cert.pub"
        mode: '0644'

    # 5. 접속할 타겟 서버들에 "이 Private Key와 서명된 Cert를 같이 써라" 라고 지시
    - name: Apply SSH Key and Certificate to target hosts
      set_fact:
        ansible_ssh_private_key_file: "/tmp/dynamic_ssh_key"
        ansible_ssh_common_args: "-o CertificateFile=/tmp/dynamic_ssh_key-cert.pub -o StrictHostKeyChecking=no"
      delegate_to: "{{ item }}"
      delegate_facts: true
      loop: "{{ groups['all'] }}"

# ==========================================
# 2. 타겟 서버에 Nginx 웹 서버 설치 및 배포 (9999 포트)
# ==========================================
- name: Setup Nginx Web Server
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: 패키지 매니저 업데이트 및 Nginx 설치
      apt:
        name: nginx
        state: present
        update_cache: yes
      become: true       # [추가] 확실하게 이 작업은 관리자 권한으로 실행!
      register: apt_res
      retries: 10        # [추가] 누군가 apt를 쓰고 있다면 최대 10번 재시도
      delay: 10          # [추가] 10초 간격으로 재시도
      until: apt_res is success
    
    - name: 9999 포트용 깔끔한 Nginx 기본 설정 덮어씌우기
      copy:
        dest: /etc/nginx/sites-available/default
        content: |
          server {
              listen 9999 default_server;
              listen [::]:9999 default_server;

              root /var/www/html;
              index index.html index.htm index.nginx-debian.html;

              server_name _;

              location / {
                  try_files $uri $uri/ =404;
              }
          }
        mode: '0644'
    
    - name: 내가 만든 index.html 파일을 웹 서버로 복사
      copy:
        src: ./index.html
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'

    - name: Nginx 서비스 재시작 및 자동 실행 설정
      service:
        name: nginx
        state: restarted
        enabled: yes

    # 작업 후 임시 키와 인증서 모두 깔끔하게 폐기
    - name: Cleanup temporary key files
      file:
        path: "{{ item }}"
        state: absent
      delegate_to: localhost
      run_once: true
      become: false      # [추가] 세마포어 내부에서는 sudo 쓰지 마!
      loop:
        - "/tmp/dynamic_ssh_key"
        - "/tmp/dynamic_ssh_key.pub"
        - "/tmp/dynamic_ssh_key-cert.pub"